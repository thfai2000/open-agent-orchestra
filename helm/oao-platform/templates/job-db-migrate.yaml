apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-db-migrate"
  namespace: {{ .Values.namespace }}
  labels:
    app: db-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: {{ .Values.coreImage }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              DB_HOST="${POSTGRES_CLIENT_SERVICE_HOST:-postgres-client}"
              export DB_HOST
              if [ -n "${POSTGRES_CLIENT_SERVICE_HOST:-}" ]; then
                export AGENT_DATABASE_URL="$(printf '%s' "$AGENT_DATABASE_URL" | sed "s/@postgres-client:/@${DB_HOST}:/; s/@postgres:/@${DB_HOST}:/")"
              fi
              echo "Waiting for PostgreSQL to accept connections..."
              for i in $(seq 1 30); do
                node -e "
                  const net = require('net');
                  const host = process.env.DB_HOST || 'postgres-client';
                  const s = new net.Socket();
                  s.setTimeout(3000);
                  s.connect(5432, host, () => { s.destroy(); process.exit(0); });
                  s.on('error', () => process.exit(1));
                  s.on('timeout', () => { s.destroy(); process.exit(1); });
                " && break
                echo "  Attempt $i/30: PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "Running Drizzle schema push..."
              # v1.37.0: models is being switched from workspace-scoped to user-scoped.
              # Drop the table if it still has the legacy workspace_id column so drizzle-kit
              # can recreate it cleanly without prompting for an interactive rename. This is
              # a one-time, idempotent guard for the v1.36.x → v1.37.0 jump.
              cd /app/packages/oao-api && node -e "
                (async () => {
                  const postgres = (await import('postgres')).default;
                  const sql = postgres(process.env.AGENT_DATABASE_URL);
                  const rows = await sql\`SELECT column_name FROM information_schema.columns WHERE table_name='models' AND column_name='workspace_id'\`;
                  if (rows.length > 0) {
                    console.log('Legacy models.workspace_id detected — dropping table for v1.37.0 user-scope migration');
                    await sql\`DROP TABLE IF EXISTS models CASCADE\`;
                  } else {
                    console.log('models table already user-scoped or missing — no pre-migration needed');
                  }
                  await sql.end();
                })().catch(e => { console.error(e); process.exit(1); });
              "
              # v4.0.0: drop start/end node types + executionMode column.
              # Triggers now point at any node directly via entryNodeKey, and graph mode
              # is the only execution mode. We:
              #   1) delete edges connected to legacy start/end nodes,
              #   2) delete the start/end nodes themselves,
              #   3) drop the legacy executionMode column,
              #   4) recreate workflow_node_type enum without 'start','end'.
              # All idempotent — safe to re-run.
              cd /app/packages/oao-api && node -e "
                (async () => {
                  const postgres = (await import('postgres')).default;
                  const sql = postgres(process.env.AGENT_DATABASE_URL);
                  try {
                    const enumRows = await sql\`SELECT enumlabel FROM pg_enum WHERE enumtypid = (SELECT oid FROM pg_type WHERE typname='workflow_node_type')\`;
                    const labels = enumRows.map(r => r.enumlabel);
                    if (labels.includes('start') || labels.includes('end')) {
                      console.log('v4.0.0: cleaning legacy start/end nodes…');
                      await sql\`UPDATE triggers t
                         SET entry_node_key = NULL
                         WHERE t.entry_node_key IS NOT NULL
                           AND EXISTS (
                             SELECT 1
                             FROM workflow_nodes wn
                             WHERE wn.workflow_id = t.workflow_id
                               AND wn.node_key = t.entry_node_key
                               AND wn.node_type IN ('start','end')
                           )\`;
                      await sql\`DELETE FROM workflow_edges WHERE from_node_key IN (SELECT node_key FROM workflow_nodes WHERE node_type IN ('start','end')) OR to_node_key IN (SELECT node_key FROM workflow_nodes WHERE node_type IN ('start','end'))\`;
                      await sql\`DELETE FROM workflow_nodes WHERE node_type IN ('start','end')\`;
                      await sql\`DELETE FROM node_executions WHERE node_type IN ('start','end')\`;
                      // Recreate enum without start/end
                      await sql\`ALTER TYPE workflow_node_type RENAME TO workflow_node_type_old\`;
                      await sql\`CREATE TYPE workflow_node_type AS ENUM ('agent_step','http_request','script','conditional','parallel','join')\`;
                      await sql\`ALTER TABLE workflow_nodes ALTER COLUMN node_type TYPE workflow_node_type USING node_type::text::workflow_node_type\`;
                      await sql\`ALTER TABLE node_executions ALTER COLUMN node_type TYPE workflow_node_type USING node_type::text::workflow_node_type\`;
                      await sql\`DROP TYPE workflow_node_type_old\`;
                      console.log('v4.0.0: workflow_node_type enum reduced to graph types only');
                    }
                    const colRows = await sql\`SELECT column_name FROM information_schema.columns WHERE table_name='workflows' AND column_name='execution_mode'\`;
                    if (colRows.length > 0) {
                      console.log('v4.0.0: dropping workflows.execution_mode column…');
                      await sql\`ALTER TABLE workflows DROP COLUMN execution_mode\`;
                    }
                    const modeEnumRows = await sql\`SELECT typname FROM pg_type WHERE typname='workflow_execution_mode'\`;
                    if (modeEnumRows.length > 0) {
                      console.log('v4.0.0: dropping workflow_execution_mode enum…');
                      await sql\`DROP TYPE IF EXISTS workflow_execution_mode\`;
                    }
                    const legacyWorkflows = await sql\`
                      SELECT w.id
                      FROM workflows w
                      WHERE NOT EXISTS (SELECT 1 FROM workflow_nodes wn WHERE wn.workflow_id = w.id)
                        AND EXISTS (SELECT 1 FROM workflow_steps ws WHERE ws.workflow_id = w.id)
                    \`;
                    let materializedNodeCount = 0;
                    let materializedEdgeCount = 0;
                    for (const workflowRow of legacyWorkflows) {
                      const stepRows = await sql\`
                        SELECT id, name, prompt_template, step_order, agent_id, model, reasoning_effort, worker_runtime, timeout_seconds
                        FROM workflow_steps
                        WHERE workflow_id = \${workflowRow.id}
                        ORDER BY step_order, id
                      \`;
                      const nodeKeys = [];
                      for (let index = 0; index < stepRows.length; index += 1) {
                        const step = stepRows[index];
                        const nodeKey = 'step_' + (index + 1);
                        nodeKeys.push(nodeKey);
                        const config = {
                          stepId: step.id,
                          stepOrder: index + 1,
                          promptTemplate: step.prompt_template,
                          agentId: step.agent_id,
                          model: step.model,
                          reasoningEffort: step.reasoning_effort,
                          workerRuntime: step.worker_runtime,
                          timeoutSeconds: step.timeout_seconds ?? 300,
                        };
                        const inserted = await sql\`
                          INSERT INTO workflow_nodes (id, workflow_id, node_key, node_type, name, config, position_x, position_y, created_at, updated_at)
                          VALUES (gen_random_uuid(), \${workflowRow.id}, \${nodeKey}, 'agent_step'::workflow_node_type, \${step.name || ('Step ' + (index + 1))}, \${sql.json(config)}::jsonb, \${320 + index * 240}, 170, now(), now())
                          ON CONFLICT (workflow_id, node_key) DO NOTHING
                        \`;
                        materializedNodeCount += inserted.count;
                      }
                      for (let index = 0; index < nodeKeys.length - 1; index += 1) {
                        const inserted = await sql\`
                          INSERT INTO workflow_edges (id, workflow_id, from_node_key, to_node_key, branch_key, label, created_at)
                          SELECT gen_random_uuid(), \${workflowRow.id}, \${nodeKeys[index]}, \${nodeKeys[index + 1]}, NULL, NULL, now()
                          WHERE NOT EXISTS (
                            SELECT 1 FROM workflow_edges
                            WHERE workflow_id = \${workflowRow.id}
                              AND from_node_key = \${nodeKeys[index]}
                              AND to_node_key = \${nodeKeys[index + 1]}
                          )
                        \`;
                        materializedEdgeCount += inserted.count;
                      }
                    }
                    console.log('v4.0.1: materialized', materializedNodeCount, 'node(s) and', materializedEdgeCount, 'edge(s) from legacy step-only workflows');
                    const danglingEntryKeys = await sql\`
                      UPDATE triggers t
                      SET entry_node_key = NULL
                      WHERE t.entry_node_key IS NOT NULL
                        AND NOT EXISTS (
                          SELECT 1
                          FROM workflow_nodes wn
                          WHERE wn.workflow_id = t.workflow_id
                            AND wn.node_key = t.entry_node_key
                        )
                    \`;
                    console.log('v4.0.1: cleared', danglingEntryKeys.count, 'dangling trigger entry node key(s)');
                  } catch (e) {
                    console.error('v4.0.0 pre-migration failed:', e);
                    process.exit(1);
                  }
                  await sql.end();
                })().catch(e => { console.error(e); process.exit(1); });
              "
              cd /app/packages/oao-api && npx drizzle-kit push --force
              echo "Running data migrations..."
              cd /app/packages/oao-api && node -e "
                (async () => {
                  const postgres = (await import('postgres')).default;
                  const sql = postgres(process.env.AGENT_DATABASE_URL);
                  try {
                    const r1 = await sql\`DELETE FROM models WHERE name = 'claude-opus-4-6'\`;
                    console.log('Deleted', r1.count, 'claude-opus-4-6 model(s)');
                  } catch (e) { console.warn('skip claude-opus-4-6 cleanup:', e.message); }
                  try {
                    const r2 = await sql\`UPDATE auth_providers SET name = 'Built-in Database' WHERE name = 'Email & Password' AND provider_type = 'database'\`;
                    console.log('Renamed', r2.count, 'auth provider(s) to Built-in Database');
                  } catch (e) { console.warn('skip auth_providers rename:', e.message); }
                  await sql.end();
                })().catch(e => { console.error(e); process.exit(1); });
              "
              echo "Running database seed..."
              cd /app/packages/oao-api && npx tsx src/database/seed.ts
          envFrom:
            - secretRef:
                name: oao-platform-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
