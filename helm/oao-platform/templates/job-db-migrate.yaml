apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-db-migrate"
  namespace: {{ .Values.namespace }}
  labels:
    app: db-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: {{ .Values.coreImage }}
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to accept connections..."
              for i in $(seq 1 30); do
                node -e "
                  const net = require('net');
                  const s = new net.Socket();
                  s.setTimeout(3000);
                  s.connect(5432, 'postgres', () => { s.destroy(); process.exit(0); });
                  s.on('error', () => process.exit(1));
                  s.on('timeout', () => { s.destroy(); process.exit(1); });
                " && break
                echo "  Attempt $i/30: PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "Running Drizzle schema push..."
              cd /app/packages/oao-api && npx drizzle-kit push
              echo "Running database seed..."
              cd /app/packages/oao-api && npx tsx src/database/seed.ts
          envFrom:
            - secretRef:
                name: oao-platform-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
