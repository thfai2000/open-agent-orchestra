apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-db-migrate"
  namespace: {{ .Values.namespace }}
  labels:
    app: db-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: {{ .Values.coreImage }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              DB_HOST="${POSTGRES_CLIENT_SERVICE_HOST:-postgres-client}"
              export DB_HOST
              if [ -n "${POSTGRES_CLIENT_SERVICE_HOST:-}" ]; then
                export AGENT_DATABASE_URL="$(printf '%s' "$AGENT_DATABASE_URL" | sed "s/@postgres-client:/@${DB_HOST}:/; s/@postgres:/@${DB_HOST}:/")"
              fi
              echo "Waiting for PostgreSQL to accept connections..."
              for i in $(seq 1 30); do
                node -e "
                  const net = require('net');
                  const host = process.env.DB_HOST || 'postgres-client';
                  const s = new net.Socket();
                  s.setTimeout(3000);
                  s.connect(5432, host, () => { s.destroy(); process.exit(0); });
                  s.on('error', () => process.exit(1));
                  s.on('timeout', () => { s.destroy(); process.exit(1); });
                " && break
                echo "  Attempt $i/30: PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "Running Drizzle schema push..."
              cd /app/packages/oao-api && npx drizzle-kit push --force
              echo "Running data migrations..."
              node -e "
                const { Client } = require('pg');
                const client = new Client({ connectionString: process.env.AGENT_DATABASE_URL });
                client.connect()
                  .then(() => client.query(\"DELETE FROM models WHERE name = 'claude-opus-4-6'\"))
                  .then(r => { console.log('Deleted', r.rowCount, 'claude-opus-4-6 model(s)'); })
                  .then(() => client.query(\"UPDATE auth_providers SET name = 'Built-in Database' WHERE name = 'Email & Password' AND provider_type = 'database'\"))
                  .then(r => { console.log('Renamed', r.rowCount, 'auth provider(s) to Built-in Database'); client.end(); })
                  .catch(e => { console.error(e); client.end(); });
              "
              echo "Running database seed..."
              cd /app/packages/oao-api && npx tsx src/database/seed.ts
          envFrom:
            - secretRef:
                name: oao-platform-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
