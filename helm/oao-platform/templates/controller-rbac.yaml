# ──────────────────────────────────────────────────────────────────────────────
# RBAC for OAO-Controller — allows dynamic agent pod provisioning
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oao-controller
  namespace: {{ .Values.namespace }}
  labels:
    app: oao-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oao-controller-pod-manager
  namespace: {{ .Values.namespace }}
  labels:
    app: oao-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oao-controller-pod-manager
  namespace: {{ .Values.namespace }}
  labels:
    app: oao-controller
subjects:
  - kind: ServiceAccount
    name: oao-controller
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: oao-controller-pod-manager
  apiGroup: rbac.authorization.k8s.io
